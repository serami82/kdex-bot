<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>미국주식 신호 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fff5f8; --surface: #ffffff; --surface2: #fff0f5; --surface3: #ffe4ef;
  --border: rgba(255,107,157,0.18); --border2: rgba(255,107,157,0.35);
  --pink: #ff6b9d; --pink2: #ff8fb1; --pink3: #ffc2d4; --pink4: #ffe4ef; --pink-deep: #e5476f;
  --green: #00b96b; --green-bg: #edfbf3; --green-border: rgba(0,185,107,0.25);
  --red: #ff3d5a; --red-bg: #fff0f3; --red-border: rgba(255,61,90,0.25);
  --yellow: #f59f00; --yellow-bg: #fffbf0;
  --blue: #228be6; --blue-bg: #f0f8ff;
  --text: #1a0a10; --text2: #6b3a50; --text3: #b08090;
  --shadow: 0 2px 20px rgba(255,107,157,0.10); --shadow2: 0 4px 30px rgba(255,107,157,0.20);
  --sans: 'Noto Sans KR', sans-serif; --display: 'Nunito', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

.header { background: var(--surface); border-bottom: 2px solid var(--pink3); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 10; box-shadow: var(--shadow); }
.logo { font-family: var(--display); font-size: 18px; font-weight: 900; background: linear-gradient(135deg, var(--pink), var(--pink-deep)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center; gap: 8px; }
.logo-icon { width: 30px; height: 30px; background: linear-gradient(135deg, var(--pink3), var(--pink)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; -webkit-text-fill-color: white; flex-shrink: 0; }
.header-right { display: flex; align-items: center; gap: 8px; }
.update-badge { background: var(--surface2); border: 1px solid var(--border2); border-radius: 20px; padding: 4px 10px; font-size: 11px; color: var(--text3); font-weight: 600; white-space: nowrap; }
.refresh-btn { background: linear-gradient(135deg, var(--pink), var(--pink-deep)); border: none; color: white; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 800; font-family: var(--display); transition: all 0.2s; box-shadow: 0 2px 10px rgba(255,107,157,0.4); white-space: nowrap; }
.refresh-btn:hover { transform: translateY(-1px); }
.refresh-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

.main { padding: 16px; max-width: 960px; margin: 0 auto; }

.search-box { background: var(--surface); border: 2px solid var(--border2); border-radius: 16px; padding: 10px 16px; margin-bottom: 16px; display: flex; gap: 8px; align-items: center; box-shadow: var(--shadow); transition: border-color 0.2s; }
.search-box:focus-within { border-color: var(--pink); }
.search-input { flex: 1; border: none; outline: none; font-family: var(--display); font-size: 14px; font-weight: 700; color: var(--text); background: transparent; text-transform: uppercase; }
.search-input::placeholder { color: var(--text3); font-weight: 600; text-transform: none; }
.search-btn { background: linear-gradient(135deg, var(--pink), var(--pink-deep)); border: none; color: white; padding: 7px 16px; border-radius: 12px; cursor: pointer; font-size: 12px; font-weight: 800; font-family: var(--display); white-space: nowrap; }

.search-result { background: var(--surface); border: 2px solid var(--pink3); border-radius: 16px; padding: 16px; margin-bottom: 16px; display: none; box-shadow: var(--shadow2); }
.search-result.show { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

.tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.tab { padding: 7px 16px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 700; font-family: var(--display); color: var(--text3); border: 1.5px solid var(--border2); background: var(--surface); transition: all 0.2s; }
.tab.active { background: linear-gradient(135deg, var(--pink), var(--pink-deep)); color: white; border-color: transparent; box-shadow: 0 2px 10px rgba(255,107,157,0.4); }

.section-title { font-family: var(--display); font-size: 12px; font-weight: 800; color: var(--pink-deep); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.section-title::before { content:''; width:3px; height:14px; background:linear-gradient(to bottom, var(--pink), var(--pink-deep)); border-radius:2px; }

.card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }

.grid3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 12px; }
.metric { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 14px; box-shadow: var(--shadow); }
.metric-label { font-size: 10px; font-weight: 800; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
.metric-value { font-size: 20px; font-weight: 900; font-family: var(--display); }

/* 티커 카드 */
.ticker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap: 10px; }
.ticker-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 14px; box-shadow: var(--shadow); transition: all 0.2s; }
.ticker-card:hover { box-shadow: var(--shadow2); border-color: var(--border2); transform: translateY(-1px); }
.ticker-card.has-signal { border-color: var(--pink2); border-width: 2px; }
.ticker-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.ticker-name { font-family: var(--display); font-size: 17px; font-weight: 900; color: var(--text); }
.ticker-price { font-size: 14px; font-weight: 700; color: var(--text2); font-family: var(--display); }

.rsi-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.rsi-label { font-size: 10px; font-weight: 700; color: var(--text3); width: 24px; }
.rsi-track { flex:1; height:5px; background:var(--surface3); border-radius:3px; position:relative; }
.rsi-fill { height:100%; border-radius:3px; }
.rsi-thumb { position:absolute; top:50%; width:11px; height:11px; border-radius:50%; background:white; border:2px solid var(--pink); transform:translate(-50%,-50%); box-shadow:0 1px 4px rgba(255,107,157,0.4); }
.rsi-val { font-size:12px; font-weight:800; font-family:var(--display); min-width:28px; text-align:right; }

.signal-tags { display:flex; flex-wrap:wrap; gap:3px; }
.tag { display:inline-block; font-size:10px; font-weight:700; padding:2px 7px; border-radius:6px; font-family:var(--display); }
.tag-green { background:var(--green-bg); color:var(--green); border:1px solid var(--green-border); }
.tag-red { background:var(--red-bg); color:var(--red); border:1px solid var(--red-border); }
.tag-yellow { background:var(--yellow-bg); color:var(--yellow); border:1px solid rgba(245,159,0,0.25); }
.tag-pink { background:var(--pink4); color:var(--pink-deep); border:1px solid var(--border2); }
.tag-blue { background:var(--blue-bg); color:var(--blue); border:1px solid rgba(34,139,230,0.25); }
.tag-none { background:var(--surface2); color:var(--text3); border:1px solid var(--border); }

/* MACD 섹션 */
.macd-row { display:flex; align-items:center; gap:6px; margin-top:8px; padding-top:8px; border-top:1px solid var(--border); }
.macd-label { font-size:10px; font-weight:700; color:var(--text3); }

/* MA 섹션 */
.ma-row { margin-top:6px; display:flex; flex-wrap:wrap; gap:3px; }

/* F&G */
.fg-big { font-family:var(--display); font-size:56px; font-weight:900; line-height:1; }
.fg-bar { height:10px; border-radius:5px; background:linear-gradient(to right, var(--red), var(--yellow), var(--green)); margin:14px 0 5px; position:relative; }
.fg-pin { position:absolute; top:-6px; width:22px; height:22px; border-radius:50%; background:white; border:3px solid var(--pink); transform:translateX(-50%); transition:left 1s cubic-bezier(.34,1.56,.64,1); box-shadow:0 2px 8px rgba(255,107,157,0.5); }
.fg-labels { display:flex; justify-content:space-between; font-size:10px; font-weight:700; color:var(--text3); }

/* VIX */
.vix-big { font-family:var(--display); font-size:48px; font-weight:900; }
.vix-bar { height:7px; border-radius:4px; background:linear-gradient(to right, var(--green), var(--yellow) 50%, var(--red)); margin-top:14px; position:relative; }
.vix-pin { position:absolute; top:-6px; width:19px; height:19px; border-radius:50%; background:white; border:3px solid var(--pink); transform:translateX(-50%); box-shadow:0 2px 6px rgba(255,107,157,0.4); }

/* 피보나치 */
.fibo-item { padding:12px 0; border-top:1px solid var(--border); }
.fibo-item:first-child { border-top:none; padding-top:0; }
.fibo-ticker-name { font-family:var(--display); font-size:14px; font-weight:900; color:var(--text); margin-bottom:2px; }
.fibo-range { font-size:11px; color:var(--text3); margin-bottom:8px; }
.fibo-rows { display:grid; grid-template-columns:repeat(4,1fr); gap:5px; }
.fibo-cell { background:var(--surface2); border-radius:8px; padding:7px 8px; border:1px solid var(--border); text-align:center; }
.fibo-cell.near { background:linear-gradient(135deg, var(--pink4), #fff); border-color:var(--pink2); box-shadow:0 2px 6px rgba(255,107,157,0.2); }
.fibo-cell-level { font-size:10px; font-weight:800; color:var(--text3); margin-bottom:2px; }
.fibo-cell-price { font-size:11px; font-weight:700; color:var(--text); font-family:var(--display); }
.fibo-cell.near .fibo-cell-price { color:var(--pink-deep); }
.fibo-near-badge { font-size:9px; font-weight:800; color:var(--pink); margin-top:1px; }

.loading { color:var(--text3); font-size:13px; font-weight:600; text-align:center; padding:40px; }
.loading::after { content:''; display:inline-block; width:14px; height:14px; border:2px solid var(--pink3); border-top-color:var(--pink); border-radius:50%; animation:spin 0.8s linear infinite; margin-left:8px; vertical-align:middle; }
@keyframes spin { to{transform:rotate(360deg)} }
.error-box { background:var(--red-bg); border:1px dashed var(--red-border); border-radius:12px; padding:14px; text-align:center; color:var(--red); font-size:13px; font-weight:600; }
.result-close { background:none; border:none; font-size:18px; cursor:pointer; color:var(--text3); padding:4px; border-radius:6px; }
.result-close:hover { background:var(--surface2); color:var(--pink); }

@media(max-width:600px){ .grid3{grid-template-columns:1fr;} .ticker-grid{grid-template-columns:1fr;} .fibo-rows{grid-template-columns:repeat(2,1fr);} }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">💹</div>
    Signal Board
  </div>
  <div class="header-right">
    <div class="update-badge" id="update-time">로딩 중...</div>
    <button class="refresh-btn" id="refresh-btn" onclick="loadData()">↻ 새로고침</button>
  </div>
</div>

<div class="main">
  <div class="search-box">
    <span>🔍</span>
    <input class="search-input" id="search-input" type="text" placeholder="티커 검색 (예: NVDA, AAPL...)" maxlength="10"
      onkeydown="if(event.key==='Enter') searchTicker()" />
    <button class="search-btn" onclick="searchTicker()">분석</button>
  </div>

  <div class="search-result" id="search-result">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <div>
        <div style="font-family:var(--display);font-size:22px;font-weight:900;" id="result-ticker">--</div>
        <div style="font-size:13px;color:var(--text2);font-weight:600;margin-top:2px;" id="result-price">--</div>
      </div>
      <button class="result-close" onclick="closeSearch()">✕</button>
    </div>
    <div id="result-content"></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('signals')">📊 기술적 신호</button>
    <button class="tab" onclick="showTab('fg')">😨 Fear & Greed</button>
    <button class="tab" onclick="showTab('fibo')">📐 피보나치</button>
  </div>

  <div id="tab-signals">
    <div class="grid3">
      <div class="metric"><div class="metric-label">VIX 지수</div><div class="metric-value" id="s-vix">--</div></div>
      <div class="metric"><div class="metric-label">Fear & Greed</div><div class="metric-value" id="s-fg">--</div></div>
      <div class="metric"><div class="metric-label">신호 발생 종목</div><div class="metric-value" id="s-count" style="color:var(--pink)">--</div></div>
    </div>
    <div class="section-title">보유 종목 기술적 신호</div>
    <div class="ticker-grid" id="ticker-grid"><div class="loading">데이터 로딩 중</div></div>
  </div>

  <div id="tab-fg" style="display:none;">
    <div class="card"><div class="section-title">CNN Fear & Greed Index</div><div id="fg-content"><div class="loading">로딩 중</div></div></div>
    <div class="card"><div class="section-title">VIX 변동성 지수</div><div id="vix-content"><div class="loading">로딩 중</div></div></div>
  </div>

  <div id="tab-fibo" style="display:none;">
    <div class="card"><div class="section-title">피보나치 되돌림 (52주 고점/저점)</div><div id="fibo-content"><div class="loading">로딩 중</div></div></div>
  </div>
</div>

<script>
let cachedData = null;

function showTab(n){
  ['signals','fg','fibo'].forEach(t=>document.getElementById('tab-'+t).style.display=t===n?'block':'none');
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['signals','fg','fibo'][i]===n));
}

function rsiColor(v){ return v<=30?'var(--green)':v>=70?'var(--red)':v>=50?'var(--yellow)':'var(--blue)'; }
function tagClass(c){ return {green:'tag-green',red:'tag-red',yellow:'tag-yellow',pink:'tag-pink',blue:'tag-blue'}[c]||'tag-none'; }

function sortTickers(tickers){
  return [...tickers].sort((a,b)=>{
    const ah=(a.signals&&a.signals.length>0)?1:0, bh=(b.signals&&b.signals.length>0)?1:0;
    if(bh!==ah) return bh-ah;
    return a.ticker.localeCompare(b.ticker);
  });
}

function tickerCardHTML(t){
  const rp = t.rsi ? Math.min(Math.max(t.rsi,0),100) : 50;
  const rc = t.rsi ? rsiColor(t.rsi) : 'var(--text3)';
  const hasSignal = t.signals && t.signals.length > 0;

  // 신호를 종류별로 분리
  const rsiSignals = (t.signals||[]).filter(s=>s.type==='RSI');
  const bbSignals  = (t.signals||[]).filter(s=>s.type==='BB');
  const maSignals  = (t.signals||[]).filter(s=>s.type==='MA');
  const macdSignals= (t.signals||[]).filter(s=>s.type==='MACD');

  const rsiTags  = rsiSignals.map(s=>`<span class="tag ${tagClass(s.color)}">${s.msg}</span>`).join('');
  const bbTags   = bbSignals.map(s=>`<span class="tag ${tagClass(s.color)}">${s.msg}</span>`).join('');
  const maTags   = maSignals.map(s=>`<span class="tag tag-pink">${s.msg}</span>`).join('');
  const macdTag  = macdSignals.map(s=>`<span class="tag ${tagClass(s.color)}">${s.msg}</span>`).join('');

  const noSignal = !hasSignal ? '<span class="tag tag-none">신호 없음</span>' : '';

  return `<div class="ticker-card ${hasSignal?'has-signal':''}">
    <div class="ticker-header">
      <div class="ticker-name">${t.ticker}</div>
      <div class="ticker-price">$${t.price?t.price.toFixed(2):'--'}</div>
    </div>
    <div class="rsi-row">
      <div class="rsi-label">RSI</div>
      <div class="rsi-track">
        <div class="rsi-fill" style="width:${rp}%;background:${rc}"></div>
        <div class="rsi-thumb" style="left:${rp}%;border-color:${rc}"></div>
      </div>
      <div class="rsi-val" style="color:${rc}">${t.rsi?t.rsi.toFixed(0):'--'}</div>
    </div>
    <div class="signal-tags">
      ${rsiTags}${bbTags}${noSignal}
    </div>
    ${maTags ? `<div class="ma-row">${maTags}</div>` : ''}
    ${macdTag ? `<div class="macd-row"><span class="macd-label">MACD</span>${macdTag}</div>` : ''}
  </div>`;
}

function fiboHTML(t){
  return `<div class="fibo-item">
    <div class="fibo-ticker-name">${t.ticker} <span style="font-size:12px;color:var(--text2);font-weight:600">$${t.price||'--'}</span></div>
    <div class="fibo-range">52주 고점 $${t.fib_high||'--'} / 저점 $${t.fib_low||'--'}</div>
    <div class="fibo-rows">
      ${(t.fibonacci||[]).map(f=>`
        <div class="fibo-cell ${f.near?'near':''}">
          <div class="fibo-cell-level">${(f.level*100).toFixed(1)}%</div>
          <div class="fibo-cell-price">$${f.price.toFixed(2)}</div>
          ${f.near?'<div class="fibo-near-badge">현재가 ✦</div>':''}
        </div>`).join('')}
    </div>
  </div>`;
}

function renderTickers(tickers){
  const sorted = sortTickers(tickers);
  let cnt = sorted.filter(t=>t.signals&&t.signals.length>0).length;
  document.getElementById('s-count').textContent = cnt+'개';
  document.getElementById('ticker-grid').innerHTML = sorted.map(tickerCardHTML).join('');
}

function renderFG(fg, vix){
  // 요약 카드
  if(fg && fg.score != null){
    const s=fg.score, clr=s<=25?'var(--red)':s<=45?'var(--yellow)':s<=55?'var(--text2)':'var(--green)';
    document.getElementById('s-fg').textContent = s+' '+fg.rating_kr;
    document.getElementById('s-fg').style.color = clr;
    document.getElementById('fg-content').innerHTML = `
      <div style="display:flex;align-items:flex-end;gap:18px;margin-bottom:18px;">
        <div class="fg-big" style="color:${clr}">${s}</div>
        <div style="padding-bottom:8px;">
          <div style="font-size:17px;font-weight:900;color:${clr};font-family:var(--display)">${fg.rating_kr}</div>
          <div style="font-size:11px;color:var(--text3);font-weight:700;margin-top:2px">CNN FEAR & GREED INDEX</div>
        </div>
      </div>
      <div class="fg-bar"><div class="fg-pin" style="left:${s}%"></div></div>
      <div class="fg-labels"><span>극단적 공포</span><span>공포</span><span>중립</span><span>탐욕</span><span>극단적 탐욕</span></div>`;
  } else {
    document.getElementById('s-fg').textContent = '--';
    document.getElementById('fg-content').innerHTML = '<div class="error-box">Fear & Greed 데이터 없음</div>';
  }

  if(vix && vix.vix){
    const v=vix.vix, clr=v>=30?'var(--red)':v>=25?'var(--yellow)':'var(--green)';
    const lbl=v>=30?'극도 불안 ⚠️':v>=25?'주의 ⚠️':v>=20?'보통':'안정 ✅';
    const pct=Math.min(Math.max((v-10)/50*100,0),100);
    document.getElementById('s-vix').textContent = v.toFixed(2);
    document.getElementById('s-vix').style.color = clr;
    document.getElementById('vix-content').innerHTML = `
      <div style="display:flex;align-items:center;gap:14px;">
        <div class="vix-big" style="color:${clr}">${v.toFixed(2)}</div>
        <div>
          <div style="font-size:15px;font-weight:900;color:${clr};font-family:var(--display)">${lbl}</div>
          <div style="font-size:12px;color:var(--text3);margin-top:3px">전일 ${vix.prev} / 변화 ${vix.change>0?'+':''}${vix.change}</div>
        </div>
      </div>
      <div class="vix-bar"><div class="vix-pin" style="left:${pct}%"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:10px;font-weight:700;color:var(--text3);margin-top:5px">
        <span>10 안정</span><span>25 주의</span><span>30 위험</span><span>60+</span>
      </div>`;
  }
}

function renderFibo(tickers){
  const sorted = sortTickers(tickers);
  document.getElementById('fibo-content').innerHTML = sorted.map(fiboHTML).join('');
}

// ── 검색 (data.json 기반) ──────────────────────────────────
function searchTicker(){
  const input = document.getElementById('search-input');
  const ticker = input.value.trim().toUpperCase();
  if (!ticker) return;

  const resultEl = document.getElementById('search-result');
  const contentEl = document.getElementById('result-content');
  resultEl.classList.add('show');
  document.getElementById('result-ticker').textContent = ticker;
  document.getElementById('result-price').textContent = '검색 중...';

  if (cachedData) {
    const found = cachedData.tickers.find(t => t.ticker === ticker);
    if (found) {
      renderSearchResult(found);
      return;
    }
  }
  document.getElementById('result-price').textContent = '';
  contentEl.innerHTML = `<div class="error-box">
    보유 종목에 없는 티커예요 (${ticker})<br>
    <span style="font-size:11px;font-weight:400;margin-top:4px;display:block">보유 종목: AVGO, TSLA, TEM, OKLO, SOXL, TQQQ, QCOM, BMNR, PLTR, GOOGL</span>
  </div>`;
}

function renderSearchResult(t){
  document.getElementById('result-price').textContent = `$${t.price ? t.price.toFixed(2) : '--'}`;
  const rp = t.rsi ? Math.min(Math.max(t.rsi,0),100) : 50;
  const rc = t.rsi ? rsiColor(t.rsi) : 'var(--text3)';

  const rsiSignals  = (t.signals||[]).filter(s=>s.type==='RSI');
  const bbSignals   = (t.signals||[]).filter(s=>s.type==='BB');
  const maSignals   = (t.signals||[]).filter(s=>s.type==='MA');
  const macdSignals = (t.signals||[]).filter(s=>s.type==='MACD');

  document.getElementById('result-content').innerHTML = `
    <div class="rsi-row" style="margin-bottom:12px;">
      <div class="rsi-label">RSI</div>
      <div class="rsi-track" style="flex:1;">
        <div class="rsi-fill" style="width:${rp}%;background:${rc}"></div>
        <div class="rsi-thumb" style="left:${rp}%;border-color:${rc}"></div>
      </div>
      <div class="rsi-val" style="color:${rc}">${t.rsi?t.rsi.toFixed(1):'--'}</div>
    </div>
    <div style="margin-bottom:10px;">
      <div class="section-title" style="margin-bottom:6px;">RSI / 볼린저밴드</div>
      <div class="signal-tags">
        ${[...rsiSignals,...bbSignals].map(s=>`<span class="tag ${tagClass(s.color)}">${s.msg}</span>`).join('') || '<span class="tag tag-none">신호 없음</span>'}
      </div>
    </div>
    ${maSignals.length ? `<div style="margin-bottom:10px;">
      <div class="section-title" style="margin-bottom:6px;">이동평균선 터치</div>
      <div class="signal-tags">${maSignals.map(s=>`<span class="tag tag-pink">${s.msg}</span>`).join('')}</div>
    </div>` : ''}
    ${macdSignals.length ? `<div style="margin-bottom:10px;">
      <div class="section-title" style="margin-bottom:6px;">MACD</div>
      <div class="signal-tags">${macdSignals.map(s=>`<span class="tag ${tagClass(s.color)}">${s.msg}</span>`).join('')}</div>
    </div>` : ''}
    <div>
      <div class="section-title" style="margin-bottom:6px;">피보나치 (52주 고 $${t.fib_high||'--'} / 저 $${t.fib_low||'--'})</div>
      <div class="fibo-rows">
        ${(t.fibonacci||[]).map(f=>`
          <div class="fibo-cell ${f.near?'near':''}">
            <div class="fibo-cell-level">${(f.level*100).toFixed(1)}%</div>
            <div class="fibo-cell-price">$${f.price.toFixed(2)}</div>
            ${f.near?'<div class="fibo-near-badge">현재가 ✦</div>':''}
          </div>`).join('')}
      </div>
    </div>`;
}

function closeSearch(){
  document.getElementById('search-result').classList.remove('show');
  document.getElementById('search-input').value = '';
}

// ── 메인 데이터 로드 (data.json) ─────────────────────────
async function loadData(){
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.textContent = '로딩 중...';
  document.getElementById('update-time').textContent = '로딩 중...';

  try {
    const res = await fetch('data.json?t='+Date.now());
    if (!res.ok) throw new Error('data.json 없음');
    const data = await res.json();
    cachedData = data;

    document.getElementById('update-time').textContent = data.updated_at || '--';
    renderTickers(data.tickers || []);
    renderFG(data.fear_greed, data.vix);
    renderFibo(data.tickers || []);
  } catch(e){
    document.getElementById('ticker-grid').innerHTML = `<div class="error-box" style="grid-column:1/-1">
      data.json 로드 실패<br>
      <span style="font-size:11px;font-weight:400;margin-top:4px;display:block">
        GitHub Actions → 대시보드 데이터 업데이트 → Run workflow를 먼저 실행해주세요
      </span>
    </div>`;
    document.getElementById('update-time').textContent = '오류';
  } finally {
    btn.disabled = false;
    btn.textContent = '↻ 새로고침';
  }
}

loadData();
</script>
</body>
</html>
