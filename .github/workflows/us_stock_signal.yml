name: 미국주식 기술적 신호 알림

on:
  schedule:
    # 미국 장 시간 중 15분마다 실행 (한국시간 22:30~05:00, UTC 13:30~20:00)
    - cron: '0,15,30,45 13,14,15,16,17,18,19 * * 1-5'
  workflow_dispatch:  # 수동 테스트 버튼

jobs:
  signal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install yfinance pandas ta requests python-dotenv

      - name: 신호 알림 실행
        env:
          KAKAO_TOKEN: ${{ secrets.KAKAO_TOKEN_FRIEND }}
        run: python us_stock_signal_notify.py
