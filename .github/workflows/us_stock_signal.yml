name: 미국주식 기술적 신호 알림

on:
  schedule:
    - cron: '0,15,30,45 13,14,15,16,17,18,19 * * 1-5'
  workflow_dispatch:
    inputs:
      test_mode:
        description: '테스트 모드 (전 종목 현재 지표값 전송)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  signal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install yfinance pandas ta requests python-dotenv

      - name: 신호 알림 실행
        env:
          KAKAO_TOKEN_FRIEND: ${{ secrets.KAKAO_TOKEN_FRIEND }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
        run: python us_stock_signal_notify.py
