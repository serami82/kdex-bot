name: 미국주식 기술적 신호 알림

on:
  schedule:
    # 프리장 브리핑: 매일 한국시간 22:00 (UTC 13:00) — Fear&Greed + 피보나치
    - cron: '0 13 * * 1-5'
    # 장중 신호: 한국시간 22:15 ~ 익일 06:00, 15분마다 (UTC 13:15 ~ 21:00)
    - cron: '15,30,45 13,14,15,16,17,18,19,20 * * 0-5'
    - cron: '0,15,30,45 21 * * 0-5'
  workflow_dispatch:
    inputs:
      test_mode:
        description: '테스트 모드 (조건 무시하고 전송)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      run_type:
        description: '실행 타입'
        required: false
        default: 'signal'
        type: choice
        options: ['signal', 'premarket']

jobs:
  signal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 당일 발송 기록 캐시 복원
        uses: actions/cache@v4
        with:
          path: sent_signals.json
          key: sent-signals-${{ github.run_id }}
          restore-keys: |
            sent-signals-

      - name: 패키지 설치
        run: pip install yfinance pandas ta requests python-dotenv fear-greed

      - name: 알림 실행
        env:
          KAKAO_TOKEN_FRIEND: ${{ secrets.KAKAO_TOKEN_FRIEND }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
          RUN_TYPE: ${{ github.event.inputs.run_type || (github.event.schedule == '0 13 * * 1-5' && 'premarket' || 'signal') }}
        run: python us_stock_signal_notify.py

      - name: 발송 기록 캐시 저장
        uses: actions/cache/save@v4
        if: always()
        with:
          path: sent_signals.json
          key: sent-signals-${{ github.run_id }}
